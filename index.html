<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARCHI BUILD — Premier House Building Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- ── React 18 + ReactDOM via CDN ── -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- ── Babel Standalone for JSX ── -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @font-face {
      font-family: 'DuneRise';
      src: url('https://db.onlinewebfonts.com/t/dune-rise.woff2') format('woff2'),
           url('https://db.onlinewebfonts.com/t/dune-rise.woff') format('woff');
      font-display: swap;
    }
    :root {
      --bg-0:#ffffff; --bg-1:#f8f6f2; --bg-2:#f2efe9; --bg-3:#ece8e0;
      --text-primary:#1a1612; --text-secondary:#5a5450; --text-muted:#9a948e;
      --gold:#b8922a; --gold-light:#d4a843; --gold-pale:#f5e9cc; --gold-bg:#fdf7eb;
      --border:rgba(184,146,42,0.18); --border-soft:rgba(26,22,18,0.08);
      --shadow-sm:0 2px 12px rgba(26,22,18,0.07);
      --shadow-md:0 8px 40px rgba(26,22,18,0.10);
      --shadow-lg:0 24px 80px rgba(26,22,18,0.14);
      --radius-pill:999px; --radius-card:20px; --radius-btn:12px;
      --glass-bg:rgba(255,255,255,0.60);
      --glass-border:rgba(255,255,255,0.80);
      --glass-shadow:0 8px 32px rgba(26,22,18,0.10),0 1.5px 0 rgba(255,255,255,0.9) inset;
      --glass-blur:blur(28px) saturate(1.8);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg-1);color:var(--text-primary);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:var(--bg-1);} ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}
    #loader{position:fixed;inset:0;background:var(--bg-0);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.9s,visibility 0.9s;}
    #loader.hidden{opacity:0;visibility:hidden;}
    .loader-logo{font-family:'DuneRise','Cinzel',serif;font-size:28px;letter-spacing:10px;color:var(--text-primary);text-transform:uppercase;margin-bottom:36px;}
    .loader-logo span{color:var(--gold);}
    .loader-track{width:180px;height:2px;background:var(--border-soft);border-radius:2px;overflow:hidden;}
    .loader-fill{height:100%;background:linear-gradient(to right,var(--gold-light),var(--gold));border-radius:2px;animation:loaderAnim 2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
    @keyframes loaderAnim{from{width:0}to{width:100%}}
    .cursor-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;}
    .cursor-ring{width:34px;height:34px;border:1.5px solid var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9997;opacity:0.55;transition:transform 0.15s,opacity 0.15s;}
    nav{position:fixed;top:20px;left:50%;transform:translateX(-50%);width:calc(100% - 64px);max-width:1200px;z-index:1000;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius-pill);background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1.5px solid var(--glass-border);box-shadow:var(--glass-shadow),0 0 0 0.5px rgba(255,255,255,0.5) inset,0 40px 80px rgba(26,22,18,0.08);transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);}
    nav::before{content:'';position:absolute;inset:0;border-radius:var(--radius-pill);background:linear-gradient(135deg,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0.10) 50%,rgba(255,255,255,0.30) 100%);pointer-events:none;}
    nav.scrolled{background:rgba(255,255,255,0.75);box-shadow:0 12px 48px rgba(26,22,18,0.14),0 1px 0 rgba(255,255,255,1) inset,0 0 0 0.5px rgba(255,255,255,0.6) inset;}
    .nav-logo{font-family:'DuneRise','Cinzel',serif;font-size:16px;letter-spacing:5px;color:var(--text-primary);text-decoration:none;font-weight:700;text-transform:uppercase;position:relative;z-index:1;}
    .nav-logo span{color:var(--gold);}
    .nav-links{display:flex;gap:4px;list-style:none;position:relative;z-index:1;}
    .nav-links a{font-size:12px;font-weight:500;letter-spacing:0.5px;color:var(--text-secondary);text-decoration:none;padding:8px 16px;border-radius:var(--radius-pill);transition:all 0.25s;}
    .nav-links a:hover{color:var(--text-primary);background:rgba(26,22,18,0.06);}
    .nav-cta{font-size:12px;font-weight:600;letter-spacing:0.3px;color:#fff;background:linear-gradient(135deg,var(--gold-light),var(--gold));padding:10px 24px;border-radius:var(--radius-pill);text-decoration:none;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(184,146,42,0.35),0 1px 0 rgba(255,255,255,0.3) inset;transition:all 0.25s;position:relative;z-index:1;}
    .nav-cta:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(184,146,42,0.45),0 1px 0 rgba(255,255,255,0.3) inset;}
    #hero{position:relative;height:100vh;min-height:700px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .hero-video-wrap{position:absolute;inset:-20%;z-index:0;will-change:transform;}
    #bgVideo{width:100%;height:100%;object-fit:cover;}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,252,245,0.72) 0%,rgba(255,248,235,0.55) 40%,rgba(245,240,228,0.68) 100%);z-index:1;}
    .hero-fade-bottom{position:absolute;bottom:0;left:0;width:100%;height:220px;background:linear-gradient(to bottom,transparent,var(--bg-1));z-index:2;}
    .hero-content{position:relative;z-index:3;text-align:center;padding:0 24px;}
    .hero-eyebrow{display:inline-flex;align-items:center;gap:10px;background:var(--gold-pale);border:1px solid var(--border);border-radius:var(--radius-pill);padding:8px 20px;margin-bottom:36px;opacity:0;transform:translateY(16px);animation:fadeUp 0.9s 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
    .hero-eyebrow span{width:6px;height:6px;background:var(--gold);border-radius:50%;display:inline-block;}
    .hero-eyebrow p{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);}
    .hero-title{font-family:'DuneRise','Cinzel',serif;font-size:clamp(48px,8.5vw,118px);font-weight:900;letter-spacing:-1px;line-height:0.95;color:var(--text-primary);text-transform:uppercase;}
    .hero-title em{font-style:normal;color:var(--gold);display:block;}
    .hero-sub{font-size:15px;font-weight:400;letter-spacing:0.3px;color:var(--text-secondary);margin-top:28px;min-height:24px;}
    .hero-actions{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:40px;opacity:0;transform:translateY(16px);animation:fadeUp 0.9s 1.1s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
    .scroll-cue{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeUp 0.9s 1.7s forwards;}
    .scroll-cue p{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
    .scroll-cue-line{width:1px;height:44px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2.2s infinite;}
    @keyframes scrollPulse{0%,100%{opacity:0.35;transform:scaleY(1);}50%{opacity:1;transform:scaleY(1.15);}}
    .btn-gold{display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.2px;color:#fff;background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 100%);padding:15px 32px;border-radius:var(--radius-pill);text-decoration:none;border:none;cursor:pointer;box-shadow:0 6px 24px rgba(184,146,42,0.38),0 1px 0 rgba(255,255,255,0.28) inset;transition:all 0.25s cubic-bezier(0.25,0.46,0.45,0.94);}
    .btn-gold:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 36px rgba(184,146,42,0.48),0 1px 0 rgba(255,255,255,0.28) inset;}
    .btn-glass{display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.2px;color:var(--text-primary);background:rgba(255,255,255,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:15px 32px;border-radius:var(--radius-pill);text-decoration:none;border:1.5px solid rgba(255,255,255,0.9);box-shadow:0 4px 16px rgba(26,22,18,0.08),0 1px 0 rgba(255,255,255,1) inset;transition:all 0.25s cubic-bezier(0.25,0.46,0.45,0.94);}
    .btn-glass:hover{transform:translateY(-2px) scale(1.02);background:rgba(255,255,255,0.85);}
    #stats{padding:0 60px;margin-top:-60px;position:relative;z-index:4;}
    .stats-glass{display:flex;justify-content:space-around;align-items:center;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1.5px solid var(--glass-border);border-radius:24px;padding:32px 40px;box-shadow:var(--shadow-md);}
    .stat-item{text-align:center;opacity:0;transform:translateY(20px);transition:all 0.7s cubic-bezier(0.25,0.46,0.45,0.94);}
    .stat-item.visible{opacity:1;transform:translateY(0);}
    .stat-num{font-family:'DuneRise','Cinzel',serif;font-size:38px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px;}
    .stat-num.counting{animation:numGlow 0.15s ease infinite alternate;}
    @keyframes numGlow{from{text-shadow:0 0 0px rgba(184,146,42,0);}to{text-shadow:0 0 24px rgba(184,146,42,0.55),0 0 8px rgba(212,168,67,0.4);}}
    .stat-lbl{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:6px;}
    .stat-sep{width:1px;height:48px;background:var(--border-soft);}
    section{padding:120px 60px;}
    .eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;opacity:0;transform:translateY(16px);transition:all 0.7s;}
    .eyebrow.visible{opacity:1;transform:translateY(0);}
    .eyebrow span{width:0!important;opacity:0;display:inline-block;height:1.5px;background:var(--gold);transition:width 0.55s 0.1s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.3s 0.1s;}
    .eyebrow.visible span{width:28px!important;opacity:1;}
    .eyebrow p{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:0;transform:translateX(-10px);transition:opacity 0.5s 0.25s,transform 0.5s 0.25s cubic-bezier(0.25,0.46,0.45,0.94);}
    .eyebrow.visible p{opacity:1;transform:translateX(0);}
    .sec-title{font-family:'DuneRise','Cinzel',serif;font-size:clamp(32px,4.5vw,58px);font-weight:900;letter-spacing:1px;line-height:1.08;color:var(--text-primary);text-transform:uppercase;}
    .sec-body{font-size:15px;font-weight:400;line-height:1.85;color:var(--text-secondary);max-width:520px;}
    .has-split-chars .char{display:inline-block;opacity:0;transform:translateY(52px) rotateX(28deg);transition:opacity 0.42s cubic-bezier(0.25,0.46,0.45,0.94),transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform,opacity;}
    .has-split-chars .char.space{display:inline-block;width:0.28em;}
    .has-split-chars.chars-visible .char{opacity:1;transform:translateY(0) rotateX(0);}
    .has-split-words .word{display:inline-block;overflow:hidden;vertical-align:bottom;line-height:1.4;margin-right:0.25em;}
    .has-split-words .word .inn{display:inline-block;opacity:0;transform:translateY(105%);transition:opacity 0.52s cubic-bezier(0.25,0.46,0.45,0.94),transform 0.52s cubic-bezier(0.25,0.46,0.45,0.94);}
    .has-split-words.words-visible .word .inn{opacity:1;transform:translateY(0);}
    .tw-cursor{display:inline-block;width:2px;height:0.85em;background:var(--gold);margin-left:3px;vertical-align:middle;border-radius:1px;animation:twBlink 0.85s step-end infinite;}
    @keyframes twBlink{0%,100%{opacity:1;}50%{opacity:0;}}
    .clip-line{display:block;overflow:hidden;}
    .clip-line .clip-inner{display:block;opacity:0;transform:translateY(100%);transition:opacity 0.65s cubic-bezier(0.25,0.46,0.45,0.94),transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94);}
    .clip-line.line-visible .clip-inner{opacity:1;transform:translateY(0);}
    #services{background:var(--bg-0);padding-top:100px;}
    .services-hd{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end;margin-bottom:64px;}
    .services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .svc-card{background:var(--bg-1);border:1.5px solid var(--border-soft);border-radius:var(--radius-card);padding:40px 32px;position:relative;overflow:hidden;cursor:pointer;opacity:0;transform:translateY(32px);transition:opacity 0.7s,transform 0.7s,box-shadow 0.3s,border-color 0.3s,background 0.3s;}
    .svc-card.visible{opacity:1;transform:translateY(0);}
    .svc-card:hover{background:var(--bg-0);border-color:var(--border);box-shadow:var(--shadow-md);transform:translateY(-4px)!important;}
    .svc-card::after{content:'';position:absolute;inset:0;border-radius:var(--radius-card);background:linear-gradient(135deg,rgba(212,168,67,0.06) 0%,transparent 60%);opacity:0;transition:opacity 0.3s;}
    .svc-card:hover::after{opacity:1;}
    .svc-num{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:24px;}
    .svc-icon{font-size:36px;margin-bottom:20px;display:block;}
    .svc-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;letter-spacing:0.5px;color:var(--text-primary);margin-bottom:12px;text-transform:uppercase;}
    .svc-desc{font-size:13px;font-weight:400;line-height:1.8;color:var(--text-muted);}
    .svc-arrow{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--gold-pale);border-radius:50%;color:var(--gold);font-size:16px;margin-top:24px;transition:all 0.3s;}
    .svc-card:hover .svc-arrow{background:var(--gold);color:#fff;transform:translateX(3px);}
    #parallax-band{position:relative;height:65vh;overflow:hidden;}
    .par-video-wrap{position:absolute;inset:-25%;will-change:transform;}
    #parallaxVideo{width:100%;height:100%;object-fit:cover;}
    .par-overlay{position:absolute;inset:0;background:linear-gradient(110deg,rgba(255,252,245,0.88) 0%,rgba(255,248,235,0.65) 45%,rgba(255,248,235,0.80) 100%);z-index:1;display:flex;align-items:center;padding:0 10%;}
    .par-content{z-index:2;max-width:680px;opacity:0;transform:translateX(-32px);transition:all 0.9s cubic-bezier(0.25,0.46,0.45,0.94);}
    .par-content.visible{opacity:1;transform:translateX(0);}
    .par-quote{font-family:'DuneRise','Cinzel',serif;font-size:clamp(28px,4vw,54px);font-weight:900;letter-spacing:1px;line-height:1.15;text-transform:uppercase;color:var(--text-primary);}
    .par-quote em{font-style:normal;color:var(--gold);}
    .par-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.70);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,0.9);border-radius:var(--radius-pill);padding:8px 18px;margin-bottom:24px;box-shadow:0 4px 16px rgba(26,22,18,0.08);}
    .par-pill span{width:6px;height:6px;background:var(--gold);border-radius:50%;}
    .par-pill p{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
    #process{background:var(--bg-1);}
    .process-hd{text-align:center;margin-bottom:72px;}
    .process-hd .eyebrow{justify-content:center;}
    .process-track{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
    .process-track::before{content:'';position:absolute;top:52px;left:calc(12.5%);width:75%;height:1px;background:linear-gradient(to right,transparent,var(--border),var(--border),transparent);}
    .proc-step{padding:0 24px;text-align:center;opacity:0;transform:translateY(24px);transition:all 0.7s;}
    .proc-step.visible{opacity:1;transform:translateY(0);}
    .proc-bubble{width:104px;height:104px;margin:0 auto 28px;border-radius:50%;background:var(--bg-0);border:2px solid var(--border-soft);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;z-index:1;box-shadow:var(--shadow-sm);transition:all 0.3s;}
    .proc-step:hover .proc-bubble{background:var(--gold-pale);border-color:var(--border);box-shadow:0 8px 32px rgba(184,146,42,0.18);transform:scale(1.06);}
    .proc-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:10px;}
    .proc-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-primary);margin-bottom:10px;}
    .proc-desc{font-size:12px;font-weight:400;line-height:1.8;color:var(--text-muted);}
    #projects{background:var(--bg-0);}
    .projects-hd{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px;}
    .projects-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:280px 280px;gap:12px;}
    .proj-card{border-radius:var(--radius-card);overflow:hidden;position:relative;cursor:pointer;opacity:0;transform:scale(0.96);transition:opacity 0.7s,transform 0.7s;box-shadow:var(--shadow-sm);}
    .proj-card.visible{opacity:1;transform:scale(1);}
    .proj-card:first-child{grid-row:span 2;}
    .proj-bg{width:100%;height:100%;background-size:cover;background-position:center;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);}
    .proj-card:hover .proj-bg{transform:scale(1.06);}
    .proj-overlay-gradient{position:absolute;bottom:0;left:0;width:100%;height:55%;background:linear-gradient(to top,rgba(16,12,8,0.52) 0%,transparent 100%);pointer-events:none;border-radius:0 0 var(--radius-card) var(--radius-card);transition:opacity 0.35s;}
    .proj-card:hover .proj-overlay-gradient{opacity:0.7;}
    .proj-chip{position:absolute;bottom:16px;left:16px;right:16px;background:rgba(255,255,255,0.82);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border:1.5px solid rgba(255,255,255,0.96);border-radius:14px;padding:10px 16px;box-shadow:0 4px 20px rgba(26,22,18,0.12),0 1px 0 rgba(255,255,255,1) inset;transition:all 0.3s;}
    .proj-card:hover .proj-chip{background:rgba(255,255,255,0.95);box-shadow:0 8px 32px rgba(26,22,18,0.18),0 1px 0 rgba(255,255,255,1) inset;transform:translateY(-2px);}
    .proj-chip-type{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);}
    .proj-chip-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text-primary);margin-top:3px;}
    #testimonial{background:var(--bg-1);padding:100px 60px;}
    .testi-wrap{max-width:820px;margin:0 auto;text-align:center;}
    .testi-card{background:var(--bg-0);border:1.5px solid var(--border-soft);border-radius:28px;padding:64px 72px;box-shadow:var(--shadow-md);position:relative;opacity:0;transform:translateY(28px);transition:all 0.8s;}
    .testi-card.visible{opacity:1;transform:translateY(0);}
    .testi-card::before{content:'"';font-family:'Cinzel',serif;font-size:100px;color:var(--gold);opacity:0.12;position:absolute;top:12px;left:40px;line-height:1;}

      --bg-0:#ffffff; --bg-1:#f8f6f2; --bg-2:#f2efe9; --bg-3:#ece8e0;
      --text-primary:#1a1612; --text-secondary:#5a5450; --text-muted:#9a948e;
      --gold:#b8922a; --gold-light:#d4a843; --gold-pale:#f5e9cc; --gold-bg:#fdf7eb;
      --border:rgba(184,146,42,0.18); --border-soft:rgba(26,22,18,0.08);
      --shadow-sm:0 2px 12px rgba(26,22,18,0.07);
      --shadow-md:0 8px 40px rgba(26,22,18,0.10);
      --shadow-lg:0 24px 80px rgba(26,22,18,0.14);
      --radius-pill:999px; --radius-card:20px; --radius-btn:12px;
      --glass-bg:rgba(255,255,255,0.60);
      --glass-border:rgba(255,255,255,0.80);
      --glass-shadow:0 8px 32px rgba(26,22,18,0.10),0 1.5px 0 rgba(255,255,255,0.9) inset;
      --glass-blur:blur(28px) saturate(1.8);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg-1);color:var(--text-primary);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:var(--bg-1);} ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}
    #loader{position:fixed;inset:0;background:var(--bg-0);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.9s,visibility 0.9s;}
    #loader.hidden{opacity:0;visibility:hidden;}
    .loader-logo{font-family:'DuneRise','Cinzel',serif;font-size:28px;letter-spacing:10px;color:var(--text-primary);text-transform:uppercase;margin-bottom:36px;}
    .loader-logo span{color:var(--gold);}
    .loader-track{width:180px;height:2px;background:var(--border-soft);border-radius:2px;overflow:hidden;}
    .loader-fill{height:100%;background:linear-gradient(to right,var(--gold-light),var(--gold));border-radius:2px;animation:loaderAnim 2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
    @keyframes loaderAnim{from{width:0}to{width:100%}}
    .cursor-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;}
    .cursor-ring{width:34px;height:34px;border:1.5px solid var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9997;opacity:0.55;transition:transform 0.15s,opacity 0.15s;}
    nav{position:fixed;top:20px;left:50%;transform:translateX(-50%);width:calc(100% - 64px);max-width:1200px;z-index:1000;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius-pill);background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1.5px solid var(--glass-border);box-shadow:var(--glass-shadow),0 0 0 0.5px rgba(255,255,255,0.5) inset,0 40px 80px rgba(26,22,18,0.08);transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);}
    nav::before{content:'';position:absolute;inset:0;border-radius:var(--radius-pill);background:linear-gradient(135deg,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0.10) 50%,rgba(255,255,255,0.30) 100%);pointer-events:none;}
    nav.scrolled{background:rgba(255,255,255,0.75);box-shadow:0 12px 48px rgba(26,22,18,0.14),0 1px 0 rgba(255,255,255,1) inset,0 0 0 0.5px rgba(255,255,255,0.6) inset;}
    .nav-logo{font-family:'DuneRise','Cinzel',serif;font-size:16px;letter-spacing:5px;color:var(--text-primary);text-decoration:none;font-weight:700;text-transform:uppercase;position:relative;z-index:1;}
    .nav-logo span{color:var(--gold);}
    .nav-links{display:flex;gap:4px;list-style:none;position:relative;z-index:1;}
    .nav-links a{font-size:12px;font-weight:500;letter-spacing:0.5px;color:var(--text-secondary);text-decoration:none;padding:8px 16px;border-radius:var(--radius-pill);transition:all 0.25s;}
    .nav-links a:hover{color:var(--text-primary);background:rgba(26,22,18,0.06);}
    .nav-cta{font-size:12px;font-weight:600;letter-spacing:0.3px;color:#fff;background:linear-gradient(135deg,var(--gold-light),var(--gold));padding:10px 24px;border-radius:var(--radius-pill);text-decoration:none;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(184,146,42,0.35),0 1px 0 rgba(255,255,255,0.3) inset;transition:all 0.25s;position:relative;z-index:1;}
    .nav-cta:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(184,146,42,0.45),0 1px 0 rgba(255,255,255,0.3) inset;}
    #hero{position:relative;height:100vh;min-height:700px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .hero-video-wrap{position:absolute;inset:-20%;z-index:0;will-change:transform;}
    #bgVideo{width:100%;height:100%;object-fit:cover;}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,252,245,0.72) 0%,rgba(255,248,235,0.55) 40%,rgba(245,240,228,0.68) 100%);z-index:1;}
    .hero-fade-bottom{position:absolute;bottom:0;left:0;width:100%;height:220px;background:linear-gradient(to bottom,transparent,var(--bg-1));z-index:2;}
    .hero-content{position:relative;z-index:3;text-align:center;padding:0 24px;}
    .hero-eyebrow{display:inline-flex;align-items:center;gap:10px;background:var(--gold-pale);border:1px solid var(--border);border-radius:var(--radius-pill);padding:8px 20px;margin-bottom:36px;opacity:0;transform:translateY(16px);animation:fadeUp 0.9s 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
    .hero-eyebrow span{width:6px;height:6px;background:var(--gold);border-radius:50%;display:inline-block;}
    .hero-eyebrow p{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);}
    .hero-title{font-family:'DuneRise','Cinzel',serif;font-size:clamp(48px,8.5vw,118px);font-weight:900;letter-spacing:-1px;line-height:0.95;color:var(--text-primary);text-transform:uppercase;}
    .hero-title em{font-style:normal;color:var(--gold);display:block;}
    .hero-sub{font-size:15px;font-weight:400;letter-spacing:0.3px;color:var(--text-secondary);margin-top:28px;min-height:24px;}
    .hero-actions{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:40px;opacity:0;transform:translateY(16px);animation:fadeUp 0.9s 1.1s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
    .scroll-cue{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeUp 0.9s 1.7s forwards;}
    .scroll-cue p{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
    .scroll-cue-line{width:1px;height:44px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2.2s infinite;}
    @keyframes scrollPulse{0%,100%{opacity:0.35;transform:scaleY(1);}50%{opacity:1;transform:scaleY(1.15);}}
    .btn-gold{display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.2px;color:#fff;background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 100%);padding:15px 32px;border-radius:var(--radius-pill);text-decoration:none;border:none;cursor:pointer;box-shadow:0 6px 24px rgba(184,146,42,0.38),0 1px 0 rgba(255,255,255,0.28) inset;transition:all 0.25s cubic-bezier(0.25,0.46,0.45,0.94);}
    .btn-gold:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 36px rgba(184,146,42,0.48),0 1px 0 rgba(255,255,255,0.28) inset;}
    .btn-glass{display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.2px;color:var(--text-primary);background:rgba(255,255,255,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:15px 32px;border-radius:var(--radius-pill);text-decoration:none;border:1.5px solid rgba(255,255,255,0.9);box-shadow:0 4px 16px rgba(26,22,18,0.08),0 1px 0 rgba(255,255,255,1) inset;transition:all 0.25s cubic-bezier(0.25,0.46,0.45,0.94);}
    .btn-glass:hover{transform:translateY(-2px) scale(1.02);background:rgba(255,255,255,0.85);}
    #stats{padding:0 60px;margin-top:-60px;position:relative;z-index:4;}
    .stats-glass{display:flex;justify-content:space-around;align-items:center;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1.5px solid var(--glass-border);border-radius:24px;padding:32px 40px;box-shadow:var(--shadow-md);}
    .stat-item{text-align:center;opacity:0;transform:translateY(20px);transition:all 0.7s cubic-bezier(0.25,0.46,0.45,0.94);}
    .stat-item.visible{opacity:1;transform:translateY(0);}
    .stat-num{font-family:'DuneRise','Cinzel',serif;font-size:38px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px;}
    .stat-num.counting{animation:numGlow 0.15s ease infinite alternate;}
    @keyframes numGlow{from{text-shadow:0 0 0px rgba(184,146,42,0);}to{text-shadow:0 0 24px rgba(184,146,42,0.55),0 0 8px rgba(212,168,67,0.4);}}
    .stat-lbl{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:6px;}
    .stat-sep{width:1px;height:48px;background:var(--border-soft);}
    section{padding:120px 60px;}
    .eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;opacity:0;transform:translateY(16px);transition:all 0.7s;}
    .eyebrow.visible{opacity:1;transform:translateY(0);}
    .eyebrow span{width:0!important;opacity:0;display:inline-block;height:1.5px;background:var(--gold);transition:width 0.55s 0.1s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.3s 0.1s;}
    .eyebrow.visible span{width:28px!important;opacity:1;}
    .eyebrow p{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:0;transform:translateX(-10px);transition:opacity 0.5s 0.25s,transform 0.5s 0.25s cubic-bezier(0.25,0.46,0.45,0.94);}
    .eyebrow.visible p{opacity:1;transform:translateX(0);}
    .sec-title{font-family:'DuneRise','Cinzel',serif;font-size:clamp(32px,4.5vw,58px);font-weight:900;letter-spacing:1px;line-height:1.08;color:var(--text-primary);text-transform:uppercase;}
    .sec-body{font-size:15px;font-weight:400;line-height:1.85;color:var(--text-secondary);max-width:520px;}
    .has-split-chars .char{display:inline-block;opacity:0;transform:translateY(52px) rotateX(28deg);transition:opacity 0.42s cubic-bezier(0.25,0.46,0.45,0.94),transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform,opacity;}
    .has-split-chars .char.space{display:inline-block;width:0.28em;}
    .has-split-chars.chars-visible .char{opacity:1;transform:translateY(0) rotateX(0);}
    .has-split-words .word{display:inline-block;overflow:hidden;vertical-align:bottom;line-height:1.4;margin-right:0.25em;}
    .has-split-words .word .inn{display:inline-block;opacity:0;transform:translateY(105%);transition:opacity 0.52s cubic-bezier(0.25,0.46,0.45,0.94),transform 0.52s cubic-bezier(0.25,0.46,0.45,0.94);}
    .has-split-words.words-visible .word .inn{opacity:1;transform:translateY(0);}
    .tw-cursor{display:inline-block;width:2px;height:0.85em;background:var(--gold);margin-left:3px;vertical-align:middle;border-radius:1px;animation:twBlink 0.85s step-end infinite;}
    @keyframes twBlink{0%,100%{opacity:1;}50%{opacity:0;}}
    .clip-line{display:block;overflow:hidden;}
    .clip-line .clip-inner{display:block;opacity:0;transform:translateY(100%);transition:opacity 0.65s cubic-bezier(0.25,0.46,0.45,0.94),transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94);}
    .clip-line.line-visible .clip-inner{opacity:1;transform:translateY(0);}
    #services{background:var(--bg-0);padding-top:100px;}
    .services-hd{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end;margin-bottom:64px;}
    .services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .svc-card{background:var(--bg-1);border:1.5px solid var(--border-soft);border-radius:var(--radius-card);padding:40px 32px;position:relative;overflow:hidden;cursor:pointer;opacity:0;transform:translateY(32px);transition:opacity 0.7s,transform 0.7s,box-shadow 0.3s,border-color 0.3s,background 0.3s;}
    .svc-card.visible{opacity:1;transform:translateY(0);}
    .svc-card:hover{background:var(--bg-0);border-color:var(--border);box-shadow:var(--shadow-md);transform:translateY(-4px)!important;}
    .svc-card::after{content:'';position:absolute;inset:0;border-radius:var(--radius-card);background:linear-gradient(135deg,rgba(212,168,67,0.06) 0%,transparent 60%);opacity:0;transition:opacity 0.3s;}
    .svc-card:hover::after{opacity:1;}
    .svc-num{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:24px;}
    .svc-icon{font-size:36px;margin-bottom:20px;display:block;}
    .svc-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;letter-spacing:0.5px;color:var(--text-primary);margin-bottom:12px;text-transform:uppercase;}
    .svc-desc{font-size:13px;font-weight:400;line-height:1.8;color:var(--text-muted);}
    .svc-arrow{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--gold-pale);border-radius:50%;color:var(--gold);font-size:16px;margin-top:24px;transition:all 0.3s;}
    .svc-card:hover .svc-arrow{background:var(--gold);color:#fff;transform:translateX(3px);}
    #parallax-band{position:relative;height:65vh;overflow:hidden;}
    .par-video-wrap{position:absolute;inset:-25%;will-change:transform;}
    #parallaxVideo{width:100%;height:100%;object-fit:cover;}
    .par-overlay{position:absolute;inset:0;background:linear-gradient(110deg,rgba(255,252,245,0.88) 0%,rgba(255,248,235,0.65) 45%,rgba(255,248,235,0.80) 100%);z-index:1;display:flex;align-items:center;padding:0 10%;}
    .par-content{z-index:2;max-width:680px;opacity:0;transform:translateX(-32px);transition:all 0.9s cubic-bezier(0.25,0.46,0.45,0.94);}
    .par-content.visible{opacity:1;transform:translateX(0);}
    .par-quote{font-family:'DuneRise','Cinzel',serif;font-size:clamp(28px,4vw,54px);font-weight:900;letter-spacing:1px;line-height:1.15;text-transform:uppercase;color:var(--text-primary);}
    .par-quote em{font-style:normal;color:var(--gold);}
    .par-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.70);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,0.9);border-radius:var(--radius-pill);padding:8px 18px;margin-bottom:24px;box-shadow:0 4px 16px rgba(26,22,18,0.08);}
    .par-pill span{width:6px;height:6px;background:var(--gold);border-radius:50%;}
    .par-pill p{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
    #process{background:var(--bg-1);}
    .process-hd{text-align:center;margin-bottom:72px;}
    .process-hd .eyebrow{justify-content:center;}
    .process-track{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
    .process-track::before{content:'';position:absolute;top:52px;left:calc(12.5%);width:75%;height:1px;background:linear-gradient(to right,transparent,var(--border),var(--border),transparent);}
    .proc-step{padding:0 24px;text-align:center;opacity:0;transform:translateY(24px);transition:all 0.7s;}
    .proc-step.visible{opacity:1;transform:translateY(0);}
    .proc-bubble{width:104px;height:104px;margin:0 auto 28px;border-radius:50%;background:var(--bg-0);border:2px solid var(--border-soft);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;z-index:1;box-shadow:var(--shadow-sm);transition:all 0.3s;}
    .proc-step:hover .proc-bubble{background:var(--gold-pale);border-color:var(--border);box-shadow:0 8px 32px rgba(184,146,42,0.18);transform:scale(1.06);}
    .proc-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);margin-bottom:10px;}
    .proc-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-primary);margin-bottom:10px;}
    .proc-desc{font-size:12px;font-weight:400;line-height:1.8;color:var(--text-muted);}
    #projects{background:var(--bg-0);}
    .projects-hd{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px;}
    .projects-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:280px 280px;gap:12px;}
    .proj-card{border-radius:var(--radius-card);overflow:hidden;position:relative;cursor:pointer;opacity:0;transform:scale(0.96);transition:opacity 0.7s,transform 0.7s;box-shadow:var(--shadow-sm);}
    .proj-card.visible{opacity:1;transform:scale(1);}
    .proj-card:first-child{grid-row:span 2;}
    .proj-bg{width:100%;height:100%;background-size:cover;background-position:center;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);}
    .proj-card:hover .proj-bg{transform:scale(1.06);}
    .proj-overlay-gradient{position:absolute;bottom:0;left:0;width:100%;height:55%;background:linear-gradient(to top,rgba(16,12,8,0.52) 0%,transparent 100%);pointer-events:none;border-radius:0 0 var(--radius-card) var(--radius-card);transition:opacity 0.35s;}
    .proj-card:hover .proj-overlay-gradient{opacity:0.7;}
    .proj-chip{position:absolute;bottom:16px;left:16px;right:16px;background:rgba(255,255,255,0.82);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border:1.5px solid rgba(255,255,255,0.96);border-radius:14px;padding:10px 16px;box-shadow:0 4px 20px rgba(26,22,18,0.12),0 1px 0 rgba(255,255,255,1) inset;transition:all 0.3s;}
    .proj-card:hover .proj-chip{background:rgba(255,255,255,0.95);box-shadow:0 8px 32px rgba(26,22,18,0.18),0 1px 0 rgba(255,255,255,1) inset;transform:translateY(-2px);}
    .proj-chip-type{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);}
    .proj-chip-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text-primary);margin-top:3px;}
    #testimonial{background:var(--bg-1);padding:100px 60px;}
    .testi-wrap{max-width:820px;margin:0 auto;text-align:center;}
    .testi-card{background:var(--bg-0);border:1.5px solid var(--border-soft);border-radius:28px;padding:64px 72px;box-shadow:var(--shadow-md);position:relative;opacity:0;transform:translateY(28px);transition:all 0.8s;}
    .testi-card.visible{opacity:1;transform:translateY(0);}
    .testi-card::before{content:'"';font-family:'Cinzel',serif;font-size:100px;color:var(--gold);opacity:0.12;position:absolute;top:12px;left:40px;line-height:1;}
    .testi-stars{font-size:18px;letter-spacing:3px;margin-bottom:28px;}
    .testi-text{font-family:'Cinzel',serif;font-size:clamp(16px,2.2vw,24px);font-weight:400;line-height:1.65;color:var(--text-primary);font-style:italic;}
    .testi-author{margin-top:36px;display:flex;align-items:center;justify-content:center;gap:16px;}
    .testi-avatar{width:48px;height:48px;border-radius:50%;background:var(--gold-pale);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;}
    .testi-name{font-size:13px;font-weight:600;color:var(--text-primary);}
    .testi-role{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
    #contact{background:var(--bg-2);}
    .contact-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:80px;align-items:start;}
    .contact-info-wrap{opacity:0;transform:translateX(-28px);transition:all 0.8s;}
    .contact-info-wrap.visible{opacity:1;transform:translateX(0);}
    .contact-card{display:flex;gap:18px;align-items:flex-start;padding:24px;background:var(--bg-0);border:1.5px solid var(--border-soft);border-radius:16px;margin-top:16px;box-shadow:var(--shadow-sm);transition:border-color 0.25s,box-shadow 0.25s,transform 0.25s;opacity:0;transform:translateX(-20px);transition:opacity 0.55s,transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94),border-color 0.25s,box-shadow 0.25s;}
    .contact-card.card-visible{opacity:1;transform:translateX(0);}
    .contact-card:hover{border-color:var(--border);box-shadow:var(--shadow-md);transform:translateY(-2px)!important;}
    .contact-icon{width:44px;height:44px;background:var(--gold-pale);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .contact-lbl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
    .contact-val{font-size:14px;font-weight:500;color:var(--text-primary);line-height:1.5;}
    .contact-form-wrap{opacity:0;transform:translateX(28px);transition:all 0.8s 0.15s;}

      useEffect(() => {
        if (!active) return;
        let i = 0; setDisplayed(''); setDone(false);
        const iv = setInterval(() => {
          if (i < text.length) { i++; setDisplayed(text.slice(0, i)); }
          else { clearInterval(iv); setDone(true); }
        }, speed);
        return () => clearInterval(iv);
      }, [active, text, speed]);
      return { displayed, done };
    }

    const CharSplit = ({ text, baseDelay = 0 }) =>
      [...text].map((ch, i) =>

          pos.current.mx = e.clientX; pos.current.my = e.clientY;
          if (dotRef.current) {
            dotRef.current.style.left = e.clientX - 3.5 + 'px';
            dotRef.current.style.top  = e.clientY - 3.5 + 'px';
          }
        };
        const onOver = (e) => {
          if (e.target.closest('a,button,.svc-card,.proj-card') && ringRef.current) {
            ringRef.current.style.transform = 'scale(1.9)';
            ringRef.current.style.opacity   = '0.35';

        const onOut = (e) => {
          if (e.target.closest('a,button,.svc-card,.proj-card') && ringRef.current) {
            ringRef.current.style.transform = 'scale(1)';
            ringRef.current.style.opacity   = '0.55';
          }
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseover',  onOver);
        document.addEventListener('mouseout',   onOut);

        let raf;
        const loop = () => {
          const p = pos.current;
          p.rx += (p.mx - p.rx) * 0.11;

          }
          raf = requestAnimationFrame(loop);
        };
        raf = requestAnimationFrame(loop);
        return () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseover',  onOver);
          document.removeEventListener('mouseout',   onOut);
          cancelAnimationFrame(raf);
        };

    .proj-card{border-radius:var(--radius-card);overflow:hidden;position:relative;cursor:pointer;opacity:0;transform:scale(0.96);transition:opacity 0.7s,transform 0.7s;box-shadow:var(--shadow-sm);}

    .proj-chip-type{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);}

    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(184,146,42,0.48);}
    .submit-btn.sent{background:linear-gradient(135deg,#4caf78,#2d8a52);}
    footer{background:var(--bg-0);border-top:1px solid var(--border-soft);padding:40px 60px;display:flex;justify-content:space-between;align-items:center;}
    .footer-logo{font-family:'DuneRise','Cinzel',serif;font-size:16px;letter-spacing:5px;color:var(--text-primary);text-transform:uppercase;}
    .footer-logo span{color:var(--gold);}
    .footer-links{display:flex;gap:28px;}
    .footer-links a{font-size:12px;font-weight:500;color:var(--text-secondary);text-decoration:none;transition:color 0.2s;}

    .footer-watermark{border-top:1px solid var(--border-soft);padding:18px 60px;background:var(--bg-0);display:flex;align-items:center;justify-content:center;gap:12px;position:relative;z-index:10;}
    .footer-watermark-link{display:inline-flex;align-items:center;cursor:pointer;}
    .footer-watermark-link img{width:30px;height:30px;object-fit:contain;opacity:0.7;filter:grayscale(20%);transition:opacity 0.25s,filter 0.25s,transform 0.25s;}
    .footer-watermark-link:hover img{opacity:1;filter:grayscale(0%);transform:scale(1.12);}
    .footer-watermark-text{font-size:12px;font-weight:500;letter-spacing:0.5px;color:var(--text-muted);}
    .footer-watermark-text a{display:inline-flex;align-items:center;gap:4px;text-decoration:none;position:relative;z-index:10;cursor:pointer;}
    .footer-watermark-text a span.brand{font-weight:800;font-size:13px;background:linear-gradient(135deg,#c850c0,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .footer-watermark-text a::after{content:'\u2197';font-size:11px;color:#c850c0;opacity:0;transform:translate(-3px,3px);transition:opacity 0.2s,transform 0.2s;-webkit-text-fill-color:#c850c0;}
    .footer-watermark-text a:hover::after{opacity:1;transform:translate(0,0);}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, memo } = React;

    function useInView(threshold = 0.12) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setInView(true); obs.unobserve(el); }
        }, { threshold });
        obs.observe(el);
        return () => obs.disconnect();
      }, [threshold]);
      return [ref, inView];
    }

    function useCountUp(target, suffix, duration, active) {
      const [value, setValue] = useState('0' + suffix);
      const [counting, setCounting] = useState(false);
      const rafRef = useRef(null);
      useEffect(() => {
        if (!active) return;
        setCounting(true);
        const start = performance.now();
        const tick = (now) => {
          const p = Math.min((now - start) / duration, 1);
          const eased = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
          setValue(Math.round(eased * target) + suffix);
          if (p < 1) { rafRef.current = requestAnimationFrame(tick); }
          else { setValue(target + suffix); setCounting(false); }
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
      }, [active]);
      return { value, counting };
    }

    function useTypewriter(text, speed, active) {
      const [displayed, setDisplayed] = useState('');
      const [done, setDone] = useState(false);
      useEffect(() => {
        if (!active) return;
        let i = 0; setDisplayed(''); setDone(false);
        const iv = setInterval(() => {
          if (i < text.length) { i++; setDisplayed(text.slice(0, i)); }
          else { clearInterval(iv); setDone(true); }
        }, speed);
        return () => clearInterval(iv);
      }, [active, text, speed]);
      return { displayed, done };
    }

    const CharSplit = ({ text, baseDelay = 0 }) =>
      [...text].map((ch, i) =>
        ch === ' '
          ? <span key={i} className="char space" style={{ transitionDelay: `${(baseDelay + i) * 38}ms` }}>&nbsp;</span>
          : <span key={i} className="char" style={{ transitionDelay: `${(baseDelay + i) * 38}ms` }}>{ch}</span>
      );

    const SectionTitle = ({ lines, inView, style = {}, as: Tag = 'h2' }) => {
      let count = 0;
      return (
        <Tag className={`sec-title has-split-chars${inView ? ' chars-visible' : ''}`} style={style}>
          {lines.map((line, li) => {
            const offset = count; count += line.length;
            return (
              <React.Fragment key={li}>
                <CharSplit text={line} baseDelay={offset} />
                {li < lines.length - 1 && <br />}
              </React.Fragment>
            );
          })}
        </Tag>
      );
    };

    const WordSplit = ({ text, inView, Tag = 'p', className = '', style = {} }) => (
      <Tag className={`${className} has-split-words${inView ? ' words-visible' : ''}`} style={style}>
        {text.split(' ').map((w, i) => (
          <span key={i} className="word">
            <span className="inn" style={{ transitionDelay: `${i * 55}ms` }}>{w}</span>
          </span>
        ))}
      </Tag>
    );

    const Eyebrow = ({ text, inView, style = {} }) => (
      <div className={`eyebrow${inView ? ' visible' : ''}`} style={style}>
        <span></span><p>{text}</p>
      </div>
    );

    const Loader = memo(({ show }) => (
      <div id="loader" className={show ? '' : 'hidden'}>
        <div className="loader-logo">Archi <span>Build</span></div>
        <div className="loader-track"><div className="loader-fill" /></div>
      </div>
    ));

    const Cursor = memo(() => {
      const dotRef  = useRef(null);
      const ringRef = useRef(null);
      const pos     = useRef({ mx:0, my:0, rx:0, ry:0 });

      useEffect(() => {
        const onMove = (e) => {
          pos.current.mx = e.clientX; pos.current.my = e.clientY;
          if (dotRef.current) {
            dotRef.current.style.left = e.clientX - 3.5 + 'px';
            dotRef.current.style.top  = e.clientY - 3.5 + 'px';
          }
        };
        const onOver = (e) => {
          if (e.target.closest('a,button,.svc-card,.proj-card') && ringRef.current) {
            ringRef.current.style.transform = 'scale(1.9)';
            ringRef.current.style.opacity   = '0.35';
          }
        };
        const onOut = (e) => {
          if (e.target.closest('a,button,.svc-card,.proj-card') && ringRef.current) {
            ringRef.current.style.transform = 'scale(1)';
            ringRef.current.style.opacity   = '0.55';
          }
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseover',  onOver);
        document.addEventListener('mouseout',   onOut);

        let raf;
        const loop = () => {
          const p = pos.current;
          p.rx += (p.mx - p.rx) * 0.11;
          p.ry += (p.my - p.ry) * 0.11;
          if (ringRef.current) {
            ringRef.current.style.left = p.rx - 17 + 'px';
            ringRef.current.style.top  = p.ry - 17 + 'px';
          }
          raf = requestAnimationFrame(loop);
        };
        raf = requestAnimationFrame(loop);
        return () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseover',  onOver);
          document.removeEventListener('mouseout',   onOut);
          cancelAnimationFrame(raf);
        };
      }, []);

      return (
        <>
          <div className="cursor-dot"  ref={dotRef}  />
          <div className="cursor-ring" ref={ringRef} />
        </>
      );
    });

    const Navbar = memo(({ scrolled }) => (
      <nav className={scrolled ? 'scrolled' : ''}>
        <a href="#" className="nav-logo">Archi <span>Build</span></a>
        <ul className="nav-links">
          {['Services','Process','Projects','Contact'].map(s => (
            <li key={s}><a href={`#${s.toLowerCase()}`}>{s}</a></li>
          ))}
        </ul>
        <a href="#contact" className="nav-cta">Get a Quote</a>
      </nav>
    ));

    const Hero = memo(({ loaderDone }) => {
      const videoRef   = useRef(null);
      const wrapRef    = useRef(null);
      const sectionRef = useRef(null);

      useEffect(() => {
        const handle = () => {
          const sy = window.scrollY;
          const hh = sectionRef.current?.offsetHeight || 0;
          if (sy < hh && wrapRef.current)
            wrapRef.current.style.transform = `translateY(${(sy/hh)*22}%)`;
        };
        window.addEventListener('scroll', handle, { passive: true });
        return () => window.removeEventListener('scroll', handle);
      }, []);

      const SUB = 'Architecture · Construction · Interior Design · Since 2005';
      const { displayed, done } = useTypewriter(SUB, 32, loaderDone);

      const titleInView = loaderDone;

      return (
        <section id="hero" ref={sectionRef}>
          <div className="hero-video-wrap" ref={wrapRef}>
            <video id="bgVideo" ref={videoRef} autoPlay muted loop playsInline>
              <source src="./kling_20260318_作品_High_quali_4507_0.mp4" type="video/mp4" />
            </video>
          </div>
          <div className="hero-overlay" />
          <div className="hero-fade-bottom" />

          <div className="hero-content">
            <div className="hero-eyebrow">
              <span /><p>Premier House Building Agency</p>
            </div>

            <h1 className={`hero-title has-split-chars${titleInView ? ' chars-visible' : ''}`}>
              <CharSplit text="Build Your" baseDelay={0} />
              <em><CharSplit text="Dream Home" baseDelay={10} /></em>
            </h1>

            <p className="hero-sub">
              {displayed}
              {!done && <span className="tw-cursor" />}
            </p>

            <div className="hero-actions">
              <a href="#projects" className="btn-gold">View Our Work ↗</a>
              <a href="#contact"  className="btn-glass">Free Consultation</a>
            </div>
          </div>

          <div className="scroll-cue">
            <p>Scroll</p>
            <div className="scroll-cue-line" />
          </div>
        </section>
      );
    });

    const StatItem = memo(({ target, suffix, label, delay = 0 }) => {
      const [ref, inView] = useInView(0.15);
      const { value, counting } = useCountUp(target, suffix, 1900, inView);
      return (
        <div className={`stat-item${inView ? ' visible' : ''}`} ref={ref} style={{ transitionDelay: `${delay}ms` }}>
          <div className={`stat-num${counting ? ' counting' : ''}`}>{value}</div>
          <div className="stat-lbl">{label}</div>
        </div>
      );
    });

    const Stats = memo(() => (
      <div id="stats">
        <div className="stats-glass">
          <StatItem target={500} suffix="+" label="Homes Built"         delay={0}   />

    .proj-card:first-child{grid-row:span 2;}
    .proj-bg{width:100%;height:100%;background-size:cover;background-position:center;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);}
    .proj-card:hover .proj-bg{transform:scale(1.06);}
    .proj-overlay-gradient{position:absolute;bottom:0;left:0;width:100%;height:55%;background:linear-gradient(to top,rgba(16,12,8,0.52) 0%,transparent 100%);pointer-events:none;border-radius:0 0 var(--radius-card) var(--radius-card);transition:opacity 0.35s;}
    .proj-card:hover .proj-overlay-gradient{opacity:0.7;}
    .proj-chip{position:absolute;bottom:16px;left:16px;right:16px;background:rgba(255,255,255,0.82);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border:1.5px solid rgba(255,255,255,0.96);border-radius:14px;padding:10px 16px;box-shadow:0 4px 20px rgba(26,22,18,0.12),0 1px 0 rgba(255,255,255,1) inset;transition:all 0.3s;}
    .proj-card:hover .proj-chip{background:rgba(255,255,255,0.95);box-shadow:0 8px 32px rgba(26,22,18,0.18),0 1px 0 rgba(255,255,255,1) inset;transform:translateY(-2px);}
    .proj-chip-type{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);}
    .proj-chip-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text-primary);margin-top:3px;}
    #testimonial{background:var(--bg-1);padding:100px 60px;}
    .testi-wrap{max-width:820px;margin:0 auto;text-align:center;}
    .testi-card{background:var(--bg-0);border:1.5px solid var(--border-soft);border-radius:28px;padding:64px 72px;box-shadow:var(--shadow-md);position:relative;opacity:0;transform:translateY(28px);transition:all 0.8s;}
    .testi-card.visible{opacity:1;transform:translateY(0);}
    .testi-card::before{content:'"';font-family:'Cinzel',serif;font-size:100px;color:var(--gold);opacity:0.12;position:absolute;top:12px;left:40px;line-height:1;}
    .testi-stars{font-size:18px;letter-spacing:3px;margin-bottom:28px;}
    .testi-text{font-family:'Cinzel',serif;font-size:clamp(16px,2.2vw,24px);font-weight:400;line-height:1.65;color:var(--text-primary);font-style:italic;}
    .testi-author{margin-top:36px;display:flex;align-items:center;justify-content:center;gap:16px;}
    .testi-avatar{width:48px;height:48px;border-radius:50%;background:var(--gold-pale);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;}
    .testi-name{font-size:13px;font-weight:600;color:var(--text-primary);}
    .testi-role{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
    #contact{background:var(--bg-2);}
    .contact-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:80px;align-items:start;}
    .contact-info-wrap{opacity:0;transform:translateX(-28px);transition:all 0.8s;}
    .contact-info-wrap.visible{opacity:1;transform:translateX(0);}
    .contact-card{display:flex;gap:18px;align-items:flex-start;padding:24px;background:var(--bg-0);border:1.5px solid var(--border-soft);border-radius:16px;margin-top:16px;box-shadow:var(--shadow-sm);transition:border-color 0.25s,box-shadow 0.25s,transform 0.25s;opacity:0;transform:translateX(-20px);transition:opacity 0.55s,transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94),border-color 0.25s,box-shadow 0.25s;}
    .contact-card.card-visible{opacity:1;transform:translateX(0);}
    .contact-card:hover{border-color:var(--border);box-shadow:var(--shadow-md);transform:translateY(-2px)!important;}
    .contact-icon{width:44px;height:44px;background:var(--gold-pale);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .contact-lbl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
    .contact-val{font-size:14px;font-weight:500;color:var(--text-primary);line-height:1.5;}
    .contact-form-wrap{opacity:0;transform:translateX(28px);transition:all 0.8s 0.15s;}
    .contact-form-wrap.visible{opacity:1;transform:translateX(0);}
    .form-card{background:var(--bg-0);border:1.5px solid var(--border-soft);border-radius:24px;padding:48px 44px;box-shadow:var(--shadow-md);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;}
    .form-group input,.form-group textarea{width:100%;background:var(--bg-1);border:1.5px solid var(--border-soft);border-radius:var(--radius-btn);padding:14px 18px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text-primary);outline:none;transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;}
    .form-group input:focus,.form-group textarea:focus{border-color:var(--gold-light);background:var(--bg-0);box-shadow:0 0 0 4px rgba(212,168,67,0.12);}
    .form-group textarea{resize:none;height:110px;}
    .form-group input::placeholder,.form-group textarea::placeholder{color:var(--text-muted);}
    .submit-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:17px 32px;background:linear-gradient(135deg,var(--gold-light),var(--gold));border:none;border-radius:var(--radius-pill);font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 8px 28px rgba(184,146,42,0.38),0 1px 0 rgba(255,255,255,0.2) inset;transition:all 0.25s cubic-bezier(0.25,0.46,0.45,0.94);margin-top:8px;}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(184,146,42,0.48);}
    .submit-btn.sent{background:linear-gradient(135deg,#4caf78,#2d8a52);}
    footer{background:var(--bg-0);border-top:1px solid var(--border-soft);padding:40px 60px;display:flex;justify-content:space-between;align-items:center;}
    .footer-logo{font-family:'DuneRise','Cinzel',serif;font-size:16px;letter-spacing:5px;color:var(--text-primary);text-transform:uppercase;}
    .footer-logo span{color:var(--gold);}
    .footer-links{display:flex;gap:28px;}
    .footer-links a{font-size:12px;font-weight:500;color:var(--text-secondary);text-decoration:none;transition:color 0.2s;}
    .footer-links a:hover{color:var(--gold);}
    .footer-watermark{border-top:1px solid var(--border-soft);padding:18px 60px;background:var(--bg-0);display:flex;align-items:center;justify-content:center;gap:12px;position:relative;z-index:10;}
    .footer-watermark-link{display:inline-flex;align-items:center;cursor:pointer;}
    .footer-watermark-link img{width:30px;height:30px;object-fit:contain;opacity:0.7;filter:grayscale(20%);transition:opacity 0.25s,filter 0.25s,transform 0.25s;}
    .footer-watermark-link:hover img{opacity:1;filter:grayscale(0%);transform:scale(1.12);}
    .footer-watermark-text{font-size:12px;font-weight:500;letter-spacing:0.5px;color:var(--text-muted);}
    .footer-watermark-text a{display:inline-flex;align-items:center;gap:4px;text-decoration:none;position:relative;z-index:10;cursor:pointer;}
    .footer-watermark-text a span.brand{font-weight:800;font-size:13px;background:linear-gradient(135deg,#c850c0,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .footer-watermark-text a::after{content:'\u2197';font-size:11px;color:#c850c0;opacity:0;transform:translate(-3px,3px);transition:opacity 0.2s,transform 0.2s;-webkit-text-fill-color:#c850c0;}
    .footer-watermark-text a:hover::after{opacity:1;transform:translate(0,0);}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, memo } = React;

    function useInView(threshold = 0.12) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setInView(true); obs.unobserve(el); }
        }, { threshold });
        obs.observe(el);
        return () => obs.disconnect();
      }, [threshold]);
      return [ref, inView];
    }

    function useCountUp(target, suffix, duration, active) {
      const [value, setValue] = useState('0' + suffix);
      const [counting, setCounting] = useState(false);
      const rafRef = useRef(null);
      useEffect(() => {
        if (!active) return;
        setCounting(true);
        const start = performance.now();
        const tick = (now) => {
          const p = Math.min((now - start) / duration, 1);
          const eased = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
          setValue(Math.round(eased * target) + suffix);
          if (p < 1) { rafRef.current = requestAnimationFrame(tick); }
          else { setValue(target + suffix); setCounting(false); }
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
      }, [active]);
      return { value, counting };
    }

    function useTypewriter(text, speed, active) {
      const [displayed, setDisplayed] = useState('');
      const [done, setDone] = useState(false);
      useEffect(() => {
        if (!active) return;
        let i = 0; setDisplayed(''); setDone(false);
        const iv = setInterval(() => {
          if (i < text.length) { i++; setDisplayed(text.slice(0, i)); }
          else { clearInterval(iv); setDone(true); }
        }, speed);
        return () => clearInterval(iv);
      }, [active, text, speed]);
      return { displayed, done };
    }

    const CharSplit = ({ text, baseDelay = 0 }) =>
      [...text].map((ch, i) =>
        ch === ' '
          ? <span key={i} className="char space" style={{ transitionDelay: `${(baseDelay + i) * 38}ms` }}>&nbsp;</span>
          : <span key={i} className="char" style={{ transitionDelay: `${(baseDelay + i) * 38}ms` }}>{ch}</span>
      );

    const SectionTitle = ({ lines, inView, style = {}, as: Tag = 'h2' }) => {
      let count = 0;
      return (
        <Tag className={`sec-title has-split-chars${inView ? ' chars-visible' : ''}`} style={style}>
          {lines.map((line, li) => {
            const offset = count; count += line.length;
            return (
              <React.Fragment key={li}>
                <CharSplit text={line} baseDelay={offset} />
                {li < lines.length - 1 && <br />}
              </React.Fragment>
            );
          })}
        </Tag>
      );
    };

    const WordSplit = ({ text, inView, Tag = 'p', className = '', style = {} }) => (
      <Tag className={`${className} has-split-words${inView ? ' words-visible' : ''}`} style={style}>
        {text.split(' ').map((w, i) => (
          <span key={i} className="word">
            <span className="inn" style={{ transitionDelay: `${i * 55}ms` }}>{w}</span>
          </span>
        ))}
      </Tag>
    );

    const Eyebrow = ({ text, inView, style = {} }) => (
      <div className={`eyebrow${inView ? ' visible' : ''}`} style={style}>
        <span></span><p>{text}</p>
      </div>
    );

    const Loader = memo(({ show }) => (
      <div id="loader" className={show ? '' : 'hidden'}>
        <div className="loader-logo">Archi <span>Build</span></div>
        <div className="loader-track"><div className="loader-fill" /></div>
      </div>
    ));

    const Cursor = memo(() => {
      const dotRef  = useRef(null);
      const ringRef = useRef(null);
      const pos     = useRef({ mx:0, my:0, rx:0, ry:0 });

      useEffect(() => {
        const onMove = (e) => {
          pos.current.mx = e.clientX; pos.current.my = e.clientY;
          if (dotRef.current) {
            dotRef.current.style.left = e.clientX - 3.5 + 'px';
            dotRef.current.style.top  = e.clientY - 3.5 + 'px';
          }
        };
        const onOver = (e) => {
          if (e.target.closest('a,button,.svc-card,.proj-card') && ringRef.current) {
            ringRef.current.style.transform = 'scale(1.9)';
            ringRef.current.style.opacity   = '0.35';
          }
        };
        const onOut = (e) => {
          if (e.target.closest('a,button,.svc-card,.proj-card') && ringRef.current) {
            ringRef.current.style.transform = 'scale(1)';
            ringRef.current.style.opacity   = '0.55';
          }
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseover',  onOver);
        document.addEventListener('mouseout',   onOut);

        let raf;
        const loop = () => {
          const p = pos.current;
          p.rx += (p.mx - p.rx) * 0.11;
          p.ry += (p.my - p.ry) * 0.11;
          if (ringRef.current) {
            ringRef.current.style.left = p.rx - 17 + 'px';
            ringRef.current.style.top  = p.ry - 17 + 'px';
          }
          raf = requestAnimationFrame(loop);
        };
        raf = requestAnimationFrame(loop);
        return () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseover',  onOver);
          document.removeEventListener('mouseout',   onOut);
          cancelAnimationFrame(raf);
        };
      }, []);

      return (
        <>
          <div className="cursor-dot"  ref={dotRef}  />
          <div className="cursor-ring" ref={ringRef} />
        </>
      );
    });

    const Navbar = memo(({ scrolled }) => (
      <nav className={scrolled ? 'scrolled' : ''}>
        <a href="#" className="nav-logo">Archi <span>Build</span></a>
        <ul className="nav-links">
          {['Services','Process','Projects','Contact'].map(s => (
            <li key={s}><a href={`#${s.toLowerCase()}`}>{s}</a></li>
          ))}
        </ul>
        <a href="#contact" className="nav-cta">Get a Quote</a>
      </nav>
    ));

    const Hero = memo(({ loaderDone }) => {
      const videoRef   = useRef(null);
      const wrapRef    = useRef(null);
      const sectionRef = useRef(null);

      useEffect(() => {
        const handle = () => {
          const sy = window.scrollY;
          const hh = sectionRef.current?.offsetHeight || 0;
          if (sy < hh && wrapRef.current)
            wrapRef.current.style.transform = `translateY(${(sy/hh)*22}%)`;
        };
        window.addEventListener('scroll', handle, { passive: true });
        return () => window.removeEventListener('scroll', handle);
      }, []);

      const SUB = 'Architecture · Construction · Interior Design · Since 2005';
      const { displayed, done } = useTypewriter(SUB, 32, loaderDone);

      const titleInView = loaderDone;

      return (
        <section id="hero" ref={sectionRef}>
          <div className="hero-video-wrap" ref={wrapRef}>
            <video id="bgVideo" ref={videoRef} autoPlay muted loop playsInline>
              <source src="./kling_20260318_作品_High_quali_4507_0.mp4" type="video/mp4" />
            </video>
          </div>
          <div className="hero-overlay" />
          <div className="hero-fade-bottom" />

          <div className="hero-content">
            <div className="hero-eyebrow">
              <span /><p>Premier House Building Agency</p>
            </div>

            <h1 className={`hero-title has-split-chars${titleInView ? ' chars-visible' : ''}`}>
              <CharSplit text="Build Your" baseDelay={0} />
              <em><CharSplit text="Dream Home" baseDelay={10} /></em>
            </h1>

            <p className="hero-sub">
              {displayed}
              {!done && <span className="tw-cursor" />}
            </p>

            <div className="hero-actions">
              <a href="#projects" className="btn-gold">View Our Work ↗</a>
              <a href="#contact"  className="btn-glass">Free Consultation</a>
            </div>
          </div>

          <div className="scroll-cue">
            <p>Scroll</p>
            <div className="scroll-cue-line" />
          </div>
        </section>
      );
    });

    const StatItem = memo(({ target, suffix, label, delay = 0 }) => {
      const [ref, inView] = useInView(0.15);
      const { value, counting } = useCountUp(target, suffix, 1900, inView);
      return (
        <div className={`stat-item${inView ? ' visible' : ''}`} ref={ref} style={{ transitionDelay: `${delay}ms` }}>
          <div className={`stat-num${counting ? ' counting' : ''}`}>{value}</div>
          <div className="stat-lbl">{label}</div>
        </div>
      );
    });

    const Stats = memo(() => (
      <div id="stats">
        <div className="stats-glass">
          <StatItem target={500} suffix="+" label="Homes Built"         delay={0}   />
          <div className="stat-sep" />
          <StatItem target={20}  suffix="+" label="Years Experience"    delay={100} />
          <div className="stat-sep" />
          <StatItem target={98}  suffix="%" label="Client Satisfaction" delay={200} />
          <div className="stat-sep" />
          <StatItem target={15}  suffix=""  label="Design Awards"       delay={300} />
        </div>
      </div>
    ));

    const SVC_DATA = [
      { num:'01', icon:'🏗️', title:'Architecture Design', desc:'Custom architectural blueprints crafted by award-winning designers blending aesthetics with structural excellence.' },
      { num:'02', icon:'🏭️', title:'Construction',        desc:'End-to-end construction management using premium materials and certified engineers ensuring durability and precision.' },
      { num:'03', icon:'🛋️', title:'Interior Design',     desc:'Transforming spaces into personalized sanctuaries with curated furniture, lighting, and material palettes.' },
      { num:'04', icon:'🌿', title:'Landscape Design',    desc:'Outdoor spaces designed to harmonize with nature — from private gardens to resort-style poolscapes.' },
      { num:'05', icon:'⚡', title:'Smart Home Tech',     desc:'Integrated smart systems for lighting, security, climate, and entertainment — all at your fingertips.' },
      { num:'06', icon:'🔑', title:'Turnkey Projects',    desc:'Complete turnkey solutions — we handle everything from permits to handover, completely stress-free.' },
    ];

    const ServiceCard = memo(({ data, delay }) => {
      const [ref, inView] = useInView(0.15);
      return (
        <div className={`svc-card${inView ? ' visible' : ''}`} ref={ref} style={{ transitionDelay: `${delay}ms` }}>
          <div className="svc-num">{data.num}</div>
          <span className="svc-icon">{data.icon}</span>
          <div className="svc-title">{data.title}</div>
          <WordSplit text={data.desc} inView={inView} Tag="p" className="svc-desc" />
          <div className="svc-arrow">→</div>
        </div>
      );
    });

    const Services = memo(() => {
      const [hdRef, hdInView] = useInView();
      return (
        <section id="services">
          <div className="services-hd" ref={hdRef}>
            <div>
              <Eyebrow text="What We Offer" inView={hdInView} />
              <SectionTitle lines={['Our','Services']} inView={hdInView} />
            </div>
            <WordSplit
              text="From groundbreaking concepts to the final finishing touch, we deliver complete home building solutions tailored to your lifestyle and vision."
              inView={hdInView} Tag="p" className="sec-body"
            />
          </div>
          <div className="services-grid">
            {SVC_DATA.map((d, i) => (
              <ServiceCard key={d.num} data={d} delay={(i % 3) * 100} />
            ))}
          </div>
        </section>
      );
    });

    const ParallaxBand = memo(() => {
      const bandRef  = useRef(null);
      const wrapRef  = useRef(null);
      const [contRef, contInView] = useInView(0.2);

      useEffect(() => {
        const handle = () => {
          if (!bandRef.current || !wrapRef.current) return;
          const rect   = bandRef.current.getBoundingClientRect();
          const offset = (rect.top + rect.height/2 - window.innerHeight/2) / window.innerHeight;
          wrapRef.current.style.transform = `translateY(${offset * 28}%)`;
        };
        window.addEventListener('scroll', handle, { passive: true });
        return () => window.removeEventListener('scroll', handle);
      }, []);

      const LINES = [
        { text: "We Don't Just", em: false },
        { text: "Build Houses.",  em: false },
        { text: "We Build Lives.", em: true  },
      ];

      return (
        <div id="parallax-band" ref={bandRef}>
          <div className="par-video-wrap" ref={wrapRef}>
            <video id="parallaxVideo" autoPlay muted loop playsInline>
              <source src="./kling_20260318_作品_High_quali_4507_0.mp4" type="video/mp4" />
            </video>
          </div>
          <div className="par-overlay">
            <div className={`par-content${contInView ? ' visible' : ''}`} ref={contRef}>
              <div className="par-pill"><span /><p>Our Philosophy</p></div>
              <div className="par-quote">
                {LINES.map((line, i) => (
                  <span key={i} className={`clip-line${contInView ? ' line-visible' : ''}`}>
                    <span className="clip-inner" style={{ transitionDelay: `${i * 150}ms` }}>
                      {line.em ? <em>{line.text}</em> : line.text}
                    </span>
                  </span>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    });

    const STEPS = [
      { icon:'💬', label:'Step 01', title:'Consultation', desc:'We begin with a deep conversation about your vision, budget, timeline, and lifestyle needs.' },
      { icon:'📐', label:'Step 02', title:'Design',       desc:'Our architects create stunning 3D visualizations and detailed blueprints for your approval.' },
      { icon:'🔨', label:'Step 03', title:'Build',        desc:'Skilled craftsmen bring your home to life using the highest quality materials and methods.' },
      { icon:'🏠', label:'Step 04', title:'Handover',     desc:'We hand you the keys to your dream home, with full warranty and post-completion support.' },
    ];

    const ProcStep = memo(({ step, delay }) => {
      const [ref, inView] = useInView(0.15);
      return (
        <div className={`proc-step${inView ? ' visible' : ''}`} ref={ref} style={{ transitionDelay: `${delay}ms` }}>
          <div className="proc-bubble">{step.icon}</div>
          <div className="proc-label">{step.label}</div>
          <div className="proc-title">{step.title}</div>
          <WordSplit text={step.desc} inView={inView} Tag="p" className="proc-desc" />
        </div>
      );
    });

    const Process = memo(() => {
      const [hdRef, hdInView] = useInView();
      return (
        <section id="process">
          <div className="process-hd" ref={hdRef}>
            <Eyebrow text="How We Work" inView={hdInView} style={{ justifyContent:'center' }} />
            <SectionTitle lines={['Our Process']} inView={hdInView} style={{ textAlign:'center' }} />
          </div>
          <div className="process-track">
            {STEPS.map((s, i) => <ProcStep key={s.label} step={s} delay={i * 150} />)}
          </div>
        </section>
      );
    });

    const PROJECTS = [

    .contact-icon{width:44px;height:44px;background:var(--gold-pale);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .contact-lbl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}

    .form-card{background:var(--bg-0);border:1.5px solid var(--border-soft);border-radius:24px;padding:48px 44px;box-shadow:var(--shadow-md);}

    .form-group input:focus,.form-group textarea:focus{border-color:var(--gold-light);background:var(--bg-0);box-shadow:0 0 0 4px rgba(212,168,67,0.12);}
